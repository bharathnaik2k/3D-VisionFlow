<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VisionFlow 3D</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-top: #030012;
      --bg-bottom: #0a0025;
      --panel: rgba(10, 5, 30, 0.82);
      --line: rgba(180, 100, 255, 0.18);
      --text: #f0eaff;
      --muted: #b8a0e0;
      --accent: #00ffcc;
      --accent-glow: rgba(0, 255, 204, 0.35);
      --accent-2: #ff00ff;
      --accent-3: #ffff00;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background: var(--bg-top);
    }

    #scene {
      width: 100vw;
      height: 100vh;
      display: block;
      position: fixed;
      top: 0;
      left: 0;
    }

    /* ── HUD Panel ── */
    #hud {
      position: fixed;
      top: 20px;
      left: 20px;
      width: min(340px, calc(100vw - 40px));
      padding: 20px 22px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        0 20px 50px rgba(0, 0, 0, 0.4),
        0 0 0 1px rgba(255, 255, 255, 0.04),
        inset 0 1px 0 rgba(255, 255, 255, 0.06);
      z-index: 10;
    }

    #hud h1 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #00ffcc, #ff00ff, #ffff00);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    #hud .subtitle {
      color: var(--muted);
      line-height: 1.5;
      font-size: 0.85rem;
      margin-bottom: 12px;
    }

    #status {
      font-size: 0.82rem;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 10px;
      background: rgba(0, 255, 204, 0.1);
      border: 1px solid rgba(0, 255, 204, 0.25);
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    #status .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: pulse-dot 1.8s ease-in-out infinite;
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.4;
        transform: scale(0.7);
      }
    }

    #error {
      color: var(--accent-3);
      margin-top: 10px;
      font-size: 0.82rem;
      display: none;
      padding: 8px 14px;
      border-radius: 10px;
      background: rgba(255, 107, 157, 0.08);
      border: 1px solid rgba(255, 107, 157, 0.15);
    }

    /* ── Webcam preview ── */
    #miniVideo {
      position: fixed;
      right: 20px;
      bottom: 20px;
      width: min(220px, 30vw);
      aspect-ratio: 4 / 3;
      object-fit: cover;
      border-radius: 18px;
      border: 1px solid var(--line);
      box-shadow:
        0 18px 40px rgba(0, 0, 0, 0.35),
        0 0 30px rgba(0, 212, 255, 0.06);
      z-index: 9;
      transform: scaleX(-1);
      background: rgba(0, 0, 0, 0.4);
    }

    #miniVideo.hidden {
      display: none;
    }

    /* ── Hand indicator ── */
    #handIndicator {
      position: fixed;
      bottom: 20px;
      left: 20px;
      padding: 10px 18px;
      border-radius: 14px;
      background: var(--panel);
      backdrop-filter: blur(16px);
      border: 1px solid var(--line);
      font-size: 0.78rem;
      color: var(--muted);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0;
      transition: opacity 0.4s;
    }

    #handIndicator.visible {
      opacity: 1;
    }

    #handIndicator .coords {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      color: var(--accent);
      font-weight: 600;
      font-size: 0.75rem;
    }

    @media (max-width: 640px) {
      #hud {
        top: 12px;
        left: 12px;
        padding: 16px;
      }

      #miniVideo {
        width: 38vw;
        right: 12px;
        bottom: 12px;
      }
    }
  </style>
</head>

<body>
  <div id="hud">
    <h1>✋ VisionFlow 3D</h1>
    <p class="subtitle">Show your hand to the camera. Move it around to control the sphere's position and rotation.</p>
    <div id="status">
      <span class="dot"></span>
      <span id="statusText">Initializing...</span>
    </div>
    <div id="error"></div>
  </div>

  <div id="handIndicator">
    <span>🖐️ Hand position:</span>
    <span class="coords" id="coordsDisplay">—</span>
  </div>

  <video id="miniVideo" class="hidden" autoplay playsinline muted></video>
  <canvas id="scene"></canvas>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from "three";
    import { UnrealBloomPass } from "three/addons/postprocessing/UnrealBloomPass.js";
    import { EffectComposer } from "three/addons/postprocessing/EffectComposer.js";
    import { RenderPass } from "three/addons/postprocessing/RenderPass.js";

    const canvas = document.getElementById("scene");
    const video = document.getElementById("miniVideo");
    const statusText = document.getElementById("statusText");
    const errorEl = document.getElementById("error");
    const handIndicator = document.getElementById("handIndicator");
    const coordsDisplay = document.getElementById("coordsDisplay");

    /* ══════════════════════ THREE.JS SCENE ══════════════════════ */
    statusText.textContent = "Loading 3D engine...";

    const scene = new THREE.Scene();
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.6;

    const cam = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 200);
    cam.position.set(0, 0, 8);

    /* ── Postprocessing bloom ── */
    const composer = new EffectComposer(renderer);
    composer.addPass(new RenderPass(scene, cam));
    const bloom = new UnrealBloomPass(
      new THREE.Vector2(window.innerWidth, window.innerHeight),
      2.2, 0.25, 0.08
    );
    composer.addPass(bloom);

    /* ── Lights ── */
    scene.add(new THREE.AmbientLight(0x6633aa, 1.2));

    const mainLight = new THREE.PointLight(0x00ffcc, 80, 50);
    mainLight.position.set(4, 4, 6);
    scene.add(mainLight);

    const purpleLight = new THREE.PointLight(0xff00ff, 60, 40);
    purpleLight.position.set(-5, -3, 4);
    scene.add(purpleLight);

    const pinkLight = new THREE.PointLight(0xffff00, 45, 35);
    pinkLight.position.set(0, 5, -3);
    scene.add(pinkLight);

    const extraLight1 = new THREE.PointLight(0x00ff66, 35, 30);
    extraLight1.position.set(3, -4, 5);
    scene.add(extraLight1);

    const extraLight2 = new THREE.PointLight(0xff3366, 30, 28);
    extraLight2.position.set(-3, 4, -4);
    scene.add(extraLight2);

    /* ── Background stars ── */
    const starsGeo = new THREE.BufferGeometry();
    const starCount = 3000;
    const starPositions = new Float32Array(starCount * 3);
    const starSizes = new Float32Array(starCount);
    for (let i = 0; i < starCount; i++) {
      starPositions[i * 3] = (Math.random() - 0.5) * 120;
      starPositions[i * 3 + 1] = (Math.random() - 0.5) * 120;
      starPositions[i * 3 + 2] = (Math.random() - 0.5) * 120;
      starSizes[i] = Math.random() * 3.0 + 0.8;
    }
    starsGeo.setAttribute("position", new THREE.BufferAttribute(starPositions, 3));
    starsGeo.setAttribute("size", new THREE.BufferAttribute(starSizes, 1));
    const starsMat = new THREE.PointsMaterial({
      color: 0xeeccff,
      size: 0.22,
      transparent: true,
      opacity: 1.0,
      sizeAttenuation: true,
    });
    const stars = new THREE.Points(starsGeo, starsMat);
    scene.add(stars);

    /* ── Main sphere group ── */
    const sphereGroup = new THREE.Group();
    scene.add(sphereGroup);

    /* ── Outer glass sphere ── */
    const outerSphere = new THREE.Mesh(
      new THREE.SphereGeometry(1.8, 64, 64),
      new THREE.MeshPhysicalMaterial({
        color: 0x2a1050,
        metalness: 0.1,
        roughness: 0.05,
        transmission: 0.92,
        thickness: 0.5,
        ior: 1.5,
        clearcoat: 1,
        clearcoatRoughness: 0.02,
        transparent: true,
        opacity: 0.4,
        envMapIntensity: 1.5,
      })
    );
    sphereGroup.add(outerSphere);

    /* ── Wireframe sphere ── */
    const wireGeo = new THREE.IcosahedronGeometry(1.85, 3);
    const wireMat = new THREE.MeshBasicMaterial({
      color: 0x00ffcc,
      wireframe: true,
      transparent: true,
      opacity: 0.35,
    });
    const wireSphere = new THREE.Mesh(wireGeo, wireMat);
    sphereGroup.add(wireSphere);

    /* ── Inner core glow ── */
    const coreMat = new THREE.MeshBasicMaterial({
      color: 0x00ffee,
      transparent: true,
      opacity: 1.0,
    });
    const core = new THREE.Mesh(new THREE.SphereGeometry(0.55, 32, 32), coreMat);
    sphereGroup.add(core);

    /* ── Outer glow shell ── */
    const glowShell = new THREE.Mesh(
      new THREE.SphereGeometry(2.0, 48, 48),
      new THREE.MeshBasicMaterial({
        color: 0x00ffcc,
        transparent: true,
        opacity: 0.08,
        side: THREE.BackSide
      })
    );
    sphereGroup.add(glowShell);

    const glowShell2 = new THREE.Mesh(
      new THREE.SphereGeometry(2.5, 48, 48),
      new THREE.MeshBasicMaterial({
        color: 0xff00ff,
        transparent: true,
        opacity: 0.04,
        side: THREE.BackSide
      })
    );
    sphereGroup.add(glowShell2);

    /* ── Inner core 2 ── */
    const core2 = new THREE.Mesh(
      new THREE.SphereGeometry(0.7, 32, 32),
      new THREE.MeshBasicMaterial({
        color: 0xff00ff,
        transparent: true,
        opacity: 0.45,
      })
    );
    sphereGroup.add(core2);

    /* ── Orbiting ring particles ── */
    const ringCount = 200;
    const ringGeo = new THREE.BufferGeometry();
    const ringPos = new Float32Array(ringCount * 3);
    const ringAngles = new Float32Array(ringCount);
    const ringRadii = new Float32Array(ringCount);
    const ringOffsets = new Float32Array(ringCount);

    for (let i = 0; i < ringCount; i++) {
      ringAngles[i] = (i / ringCount) * Math.PI * 2;
      ringRadii[i] = 2.2 + Math.random() * 0.4;
      ringOffsets[i] = (Math.random() - 0.5) * 0.3;
      ringPos[i * 3] = Math.cos(ringAngles[i]) * ringRadii[i];
      ringPos[i * 3 + 1] = ringOffsets[i];
      ringPos[i * 3 + 2] = Math.sin(ringAngles[i]) * ringRadii[i];
    }
    ringGeo.setAttribute("position", new THREE.BufferAttribute(ringPos, 3));

    const ringMat = new THREE.PointsMaterial({
      color: 0x00ffcc,
      size: 0.12,
      transparent: true,
      opacity: 1.0,
      sizeAttenuation: true,
    });
    const ringParticles = new THREE.Points(ringGeo, ringMat);
    sphereGroup.add(ringParticles);

    /* ── Second ring (tilted) ── */
    const ring2Count = 150;
    const ring2Geo = new THREE.BufferGeometry();
    const ring2Pos = new Float32Array(ring2Count * 3);
    const ring2Angles = new Float32Array(ring2Count);
    const ring2Radii = new Float32Array(ring2Count);

    for (let i = 0; i < ring2Count; i++) {
      ring2Angles[i] = (i / ring2Count) * Math.PI * 2;
      ring2Radii[i] = 2.6 + Math.random() * 0.3;
      ring2Pos[i * 3] = Math.cos(ring2Angles[i]) * ring2Radii[i];
      ring2Pos[i * 3 + 1] = Math.sin(ring2Angles[i]) * 0.15;
      ring2Pos[i * 3 + 2] = Math.sin(ring2Angles[i]) * ring2Radii[i];
    }
    ring2Geo.setAttribute("position", new THREE.BufferAttribute(ring2Pos, 3));
    const ring2 = new THREE.Points(ring2Geo, new THREE.PointsMaterial({
      color: 0xff00ff,
      size: 0.10,
      transparent: true,
      opacity: 1.0,
      sizeAttenuation: true,
    }));
    ring2.rotation.x = Math.PI * 0.35;
    ring2.rotation.z = Math.PI * 0.15;
    sphereGroup.add(ring2);

    /* ── Third ring (yellow, vertical) ── */
    const ring3Count = 100;
    const ring3Geo = new THREE.BufferGeometry();
    const ring3Pos = new Float32Array(ring3Count * 3);
    const ring3Angles = new Float32Array(ring3Count);
    const ring3Radii = new Float32Array(ring3Count);
    for (let i = 0; i < ring3Count; i++) {
      ring3Angles[i] = (i / ring3Count) * Math.PI * 2;
      ring3Radii[i] = 2.4 + Math.random() * 0.35;
      ring3Pos[i * 3] = Math.cos(ring3Angles[i]) * ring3Radii[i];
      ring3Pos[i * 3 + 1] = Math.sin(ring3Angles[i]) * ring3Radii[i] * 0.1;
      ring3Pos[i * 3 + 2] = Math.sin(ring3Angles[i]) * ring3Radii[i];
    }
    ring3Geo.setAttribute("position", new THREE.BufferAttribute(ring3Pos, 3));
    const ring3 = new THREE.Points(ring3Geo, new THREE.PointsMaterial({
      color: 0xffff00,
      size: 0.09,
      transparent: true,
      opacity: 1.0,
      sizeAttenuation: true,
    }));
    ring3.rotation.x = Math.PI * 0.5;
    ring3.rotation.y = Math.PI * 0.25;
    sphereGroup.add(ring3);

    /* ── Floating energy particles around sphere ── */
    const energyCount = 400;
    const energyGeo = new THREE.BufferGeometry();
    const energyPositions = new Float32Array(energyCount * 3);
    const energySpeeds = [];

    for (let i = 0; i < energyCount; i++) {
      const theta = Math.random() * Math.PI * 2;
      const phi = Math.acos(2 * Math.random() - 1);
      const r = 1.9 + Math.random() * 1.5;
      energyPositions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
      energyPositions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      energyPositions[i * 3 + 2] = r * Math.cos(phi);
      energySpeeds.push({
        theta: theta,
        phi: phi,
        r: r,
        speed: 0.002 + Math.random() * 0.008,
        offset: Math.random() * Math.PI * 2
      });
    }
    energyGeo.setAttribute("position", new THREE.BufferAttribute(energyPositions, 3));
    const energyParticles = new THREE.Points(energyGeo, new THREE.PointsMaterial({
      color: 0xffff00,
      size: 0.07,
      transparent: true,
      opacity: 0.9,
      sizeAttenuation: true,
    }));
    sphereGroup.add(energyParticles);

    /* ══════════════════════ STATE ══════════════════════ */
    const state = {
      currentX: 0, currentY: 0,
      currentRotX: 0, currentRotY: 0,
      targetX: 0, targetY: 0,
      targetRotX: 0, targetRotY: 0,
      handDetected: false,
      interactionScale: 1,
      targetScale: 1,
      globeSpinSpeed: 0,
      prevHandX: 0.5,
    };

    let handLandmarker = null;
    let lastVideoTime = -1;
    let useMouse = false;
    let clock = new THREE.Clock();

    /* ══════════════════════ CAMERA ══════════════════════ */
    async function setupCamera() {
      statusText.textContent = "Requesting camera access...";
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "user", width: { ideal: 960 }, height: { ideal: 720 } },
        audio: false
      });
      video.srcObject = stream;
      video.classList.remove("hidden");
      await video.play();
    }

    /* ══════════════════════ HAND TRACKING ══════════════════════ */
    async function setupHandTracker() {
      statusText.textContent = "Loading hand tracking model...";

      const visionModule = await import(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/+esm"
      );
      const { HandLandmarker, FilesetResolver } = visionModule;

      const resolver = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );

      handLandmarker = await HandLandmarker.createFromOptions(resolver, {
        baseOptions: {
          modelAssetPath:
            "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"
        },
        runningMode: "VIDEO",
        numHands: 1
      });
    }

    /* ══════════════════════ HAND UPDATE ══════════════════════ */
    function updateHandTracking() {
      if (useMouse || !handLandmarker || video.readyState < 2) return;
      if (video.currentTime === lastVideoTime) return;
      lastVideoTime = video.currentTime;

      const result = handLandmarker.detectForVideo(video, performance.now());
      const landmarks = result.landmarks?.[0];

      if (!landmarks) {
        state.handDetected = false;
        state.targetScale = 1;
        statusText.textContent = "Show your hand to the camera...";
        handIndicator.classList.remove("visible");
        return;
      }

      state.handDetected = true;

      // Use wrist (0) as main position anchor
      const wrist = landmarks[0];
      // Use middle finger tip (12) for tilt calculation
      const middleTip = landmarks[12];
      // Use index finger tip (8) for pinch control
      const indexTip = landmarks[8];
      const thumbTip = landmarks[4];

      // Position: map hand center to scene space
      const handX = (wrist.x - 0.5) * 2; // -1 to 1 (mirrored)
      const handY = (0.5 - wrist.y) * 2;  // -1 to 1

      state.targetX = THREE.MathUtils.clamp(-handX * 3.5, -4, 4);
      state.targetY = THREE.MathUtils.clamp(handY * 2.5, -2.5, 2.5);

      // Globe rotation: movement speed on X axis spins the globe
      const handMoveX = wrist.x - state.prevHandX;
      state.globeSpinSpeed = THREE.MathUtils.clamp(-handMoveX * 15, -0.15, 0.15);
      state.prevHandX = wrist.x;

      // Rotation: based on finger direction relative to wrist
      const dx = middleTip.x - wrist.x;
      const dy = middleTip.y - wrist.y;
      state.targetRotX = THREE.MathUtils.clamp(dy * 3, -1, 1);

      // Pinch detection: thumb to index distance affects scale
      const pinchDist = Math.sqrt(
        (thumbTip.x - indexTip.x) ** 2 +
        (thumbTip.y - indexTip.y) ** 2 +
        (thumbTip.z - indexTip.z) ** 2
      );
      state.targetScale = THREE.MathUtils.clamp(0.5 + pinchDist * 6, 0.6, 1.8);

      // UI updates
      coordsDisplay.textContent = `X:${state.targetX.toFixed(1)}  Y:${state.targetY.toFixed(1)}`;
      handIndicator.classList.add("visible");
      statusText.textContent = "✋ Hand tracking active!";
    }

    /* ══════════════════════ MOUSE FALLBACK ══════════════════════ */
    function enableMouseFallback() {
      useMouse = true;
      function onMove(e) {
        const x = (e.clientX / window.innerWidth - 0.5) * 2;
        const y = -(e.clientY / window.innerHeight - 0.5) * 2;
        state.targetX = THREE.MathUtils.clamp(x * 3.5, -4, 4);
        state.targetY = THREE.MathUtils.clamp(y * 2.5, -2.5, 2.5);
        state.targetRotY = THREE.MathUtils.clamp(x * 0.8, -1.2, 1.2);
        state.targetRotX = THREE.MathUtils.clamp(y * 0.5, -1, 1);
        coordsDisplay.textContent = `X:${state.targetX.toFixed(1)}  Y:${state.targetY.toFixed(1)}`;
        handIndicator.classList.add("visible");
      }
      window.addEventListener("mousemove", onMove);
      window.addEventListener("touchmove", (e) => {
        const t = e.touches[0];
        onMove({ clientX: t.clientX, clientY: t.clientY });
      });
    }

    /* ══════════════════════ ANIMATION ══════════════════════ */
    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      updateHandTracking();

      // Smooth interpolation
      const lerpSpeed = 0.07;
      state.currentX = THREE.MathUtils.lerp(state.currentX, state.targetX, lerpSpeed);
      state.currentY = THREE.MathUtils.lerp(state.currentY, state.targetY, lerpSpeed);
      state.currentRotX = THREE.MathUtils.lerp(state.currentRotX, state.targetRotX, lerpSpeed);
      state.currentRotY = THREE.MathUtils.lerp(state.currentRotY, state.targetRotY, lerpSpeed);
      state.interactionScale = THREE.MathUtils.lerp(state.interactionScale, state.targetScale, 0.05);

      // Apply to sphere group
      sphereGroup.position.x = state.currentX;
      sphereGroup.position.y = state.currentY;
      sphereGroup.rotation.x = state.currentRotX;

      // Globe rotation: hand left/right spins the globe continuously
      state.globeSpinSpeed *= 0.96; // friction
      sphereGroup.rotation.y += state.globeSpinSpeed + 0.003;

      sphereGroup.scale.setScalar(state.interactionScale);

      // Idle rotation
      outerSphere.rotation.y += 0.003;
      outerSphere.rotation.x += 0.001;
      wireSphere.rotation.y -= 0.005;
      wireSphere.rotation.z += 0.002;

      // Pulsing core - intense
      const pulse = 0.8 + Math.sin(t * 2.5) * 0.2;
      core.material.opacity = pulse;
      core.scale.setScalar(1 + Math.sin(t * 3) * 0.15);
      core2.rotation.y += 0.015;
      core2.rotation.x -= 0.01;
      core2.scale.setScalar(1 + Math.sin(t * 1.8) * 0.1);

      // Glow shell pulse
      glowShell.material.opacity = 0.06 + Math.sin(t * 1.5) * 0.04;
      glowShell.scale.setScalar(1 + Math.sin(t * 2) * 0.05);
      glowShell2.material.opacity = 0.03 + Math.sin(t * 1.2 + 1) * 0.02;

      // Animate ring particles
      const positions = ringParticles.geometry.attributes.position.array;
      for (let i = 0; i < ringCount; i++) {
        ringAngles[i] += 0.008;
        const wobble = Math.sin(t * 2 + i * 0.3) * 0.08;
        positions[i * 3] = Math.cos(ringAngles[i]) * (ringRadii[i] + wobble);
        positions[i * 3 + 1] = ringOffsets[i] + Math.sin(t * 1.5 + i * 0.2) * 0.15;
        positions[i * 3 + 2] = Math.sin(ringAngles[i]) * (ringRadii[i] + wobble);
      }
      ringParticles.geometry.attributes.position.needsUpdate = true;

      // Animate ring2
      const positions2 = ring2.geometry.attributes.position.array;
      for (let i = 0; i < ring2Count; i++) {
        ring2Angles[i] -= 0.005;
        positions2[i * 3] = Math.cos(ring2Angles[i]) * ring2Radii[i];
        positions2[i * 3 + 1] = Math.sin(ring2Angles[i]) * 0.15 + Math.sin(t + i * 0.4) * 0.1;
        positions2[i * 3 + 2] = Math.sin(ring2Angles[i]) * ring2Radii[i];
      }
      ring2.geometry.attributes.position.needsUpdate = true;

      // Animate energy particles
      const ePos = energyParticles.geometry.attributes.position.array;
      for (let i = 0; i < energyCount; i++) {
        const s = energySpeeds[i];
        s.theta += s.speed;
        const rNow = s.r + Math.sin(t * 0.8 + s.offset) * 0.3;
        ePos[i * 3] = rNow * Math.sin(s.phi) * Math.cos(s.theta);
        ePos[i * 3 + 1] = rNow * Math.sin(s.phi) * Math.sin(s.theta);
        ePos[i * 3 + 2] = rNow * Math.cos(s.phi);
      }
      energyParticles.geometry.attributes.position.needsUpdate = true;

      // Slowly rotate stars
      stars.rotation.y += 0.0002;
      stars.rotation.x += 0.0001;

      // Dynamic lights
      mainLight.position.x = 4 + Math.sin(t * 0.5) * 2;
      mainLight.position.y = 4 + Math.cos(t * 0.7) * 1.5;
      purpleLight.position.y = -3 + Math.sin(t * 0.4) * 2;

      // Wireframe opacity reacts to hand
      wireMat.opacity = state.handDetected ? 0.5 : 0.35;
      ringMat.opacity = state.handDetected ? 1.0 : 0.9;

      // Animate ring3
      const positions3 = ring3.geometry.attributes.position.array;
      for (let i = 0; i < ring3Count; i++) {
        ring3Angles[i] += 0.006;
        positions3[i * 3] = Math.cos(ring3Angles[i]) * ring3Radii[i];
        positions3[i * 3 + 1] = Math.sin(ring3Angles[i]) * ring3Radii[i] * 0.1 + Math.sin(t * 1.2 + i * 0.3) * 0.12;
        positions3[i * 3 + 2] = Math.sin(ring3Angles[i]) * ring3Radii[i];
      }
      ring3.geometry.attributes.position.needsUpdate = true;

      // Dynamic extra lights
      extraLight1.position.x = 3 + Math.sin(t * 0.6) * 3;
      extraLight2.position.z = -4 + Math.cos(t * 0.45) * 3;

      composer.render();
    }

    /* ══════════════════════ HELPERS ══════════════════════ */
    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.style.display = "block";
    }

    window.addEventListener("resize", () => {
      cam.aspect = window.innerWidth / window.innerHeight;
      cam.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      composer.setSize(window.innerWidth, window.innerHeight);
    });

    /* ══════════════════════ MAIN ══════════════════════ */
    async function main() {
      // Start animation immediately
      animate();
      statusText.textContent = "3D scene ready!";

      // Try camera
      try {
        await setupCamera();
        statusText.textContent = "Camera ready. Loading hand tracker...";
      } catch (err) {
        console.warn("Camera error:", err);
        showError("Camera unavailable — using mouse/touch control.");
        statusText.textContent = "🖱️ Mouse control active. Move cursor to control sphere.";
        enableMouseFallback();
        return;
      }

      // Try hand tracker
      try {
        await setupHandTracker();
        statusText.textContent = "Show your hand to the camera...";
      } catch (err) {
        console.warn("Hand tracker error:", err);
        showError("Hand tracker failed — using mouse/touch control.");
        statusText.textContent = "🖱️ Mouse control active. Move cursor to control sphere.";
        enableMouseFallback();
      }
    }

    main();
  </script>
</body>

</html>
